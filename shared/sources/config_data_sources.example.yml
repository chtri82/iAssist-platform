    - "api.github.com"             # GitHub developer API
    - "en.wikipedia.org"           # MediaWiki/Wikipedia API

home_environment:
  description: "IoT, home automation, and environment data"
  approved_domains:
    - "api.weather.gov"

science_technology:
  description: "STEM, space, and innovation data APIs"
  approved_domains:
    - "api.nasa.gov"

psychology_behavior:
  description: "Behavioral and cognitive science datasets"
  approved_domains:
    - "data.unicef.org"

animal_veterinary:
  description: "Animal health and veterinary datasets"
  approved_domains:
    - "openvetscience.org"
